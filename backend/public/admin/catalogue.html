<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Service Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* ── Specialized Catalogue Styles ───────────────── */
        .type-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            padding: 6px;
            background: var(--primary-light);
            border-radius: 14px;
            width: fit-content;
        }

        .type-tab {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .type-tab:hover {
            color: var(--primary);
        }

        .type-tab.active {
            background: #FFFFFF;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* ── Toolbar ────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
            flex: 1;
            flex-wrap: wrap;
        }

        /* Global form styles now handled by dashboard.css */
        .search-input {
            min-width: 250px;
        }

        .search-input {
            min-width: 200px;
        }

        .btn-add {
            background: var(--primary);
            color: #FFF;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        /* ── Pill badge for gender ──────────────────────── */
        .gender-pill {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
        }

        .male {
            background: rgba(59, 130, 246, 0.15);
            color: #60A5FA;
        }

        .female {
            background: rgba(236, 72, 153, 0.15);
            color: #F472B6;
        }

        .all-genders {
            background: rgba(16, 185, 129, 0.15);
            color: #34D399;
        }

        /* ── Modal ──────────────────────────────────────── */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-bg.open {
            display: flex;
        }

        .modal {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        .btn-save {
            background: var(--primary);
            color: #FFF;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            background: var(--surface);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        /* ── Misc ───────────────────────────────────────── */
        .btn-edit,
        .btn-del {
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        .btn-edit {
            background: var(--primary-light);
            color: var(--primary);
            margin-right: 4px;
        }

        .btn-edit:hover {
            background: rgba(91, 100, 211, 0.3);
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-del:hover {
            background: rgba(239, 68, 68, 0.25);
        }
    </style>
</head>

<body>

    <script src="sidebar.js"></script>
    <nav class="nav">
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page">
        <div class="page-title">Service Catalogue</div>
        <div class="page-sub">Manage the master catalogue consumed by all partners and customers</div>

        <!-- Partner Type Tabs -->
        <div class="type-tabs">
            <button class="type-tab active" onclick="setTypeTab('freelancer',this)">
                <span>👤 Freelancer</span>
                <span class="badge" style="background: rgba(255,255,255,0.1); color: var(--text-dim); font-size: 10px;">Platform Pricing</span>
            </button>
            <button class="type-tab" onclick="setTypeTab('salon',this)">
                <span>🏪 Salon</span>
                <span class="badge" style="background: rgba(255,255,255,0.1); color: var(--text-dim); font-size: 10px;">Partner Pricing</span>
            </button>
        </div>

        <!-- Toolbar: Category filter + Gender filter + Search + Add -->
        <div class="toolbar">
            <div class="toolbar-left">
                <select id="filterCategory" onchange="renderTable()">
                    <option value="">All Categories</option>
                    <option>Hair &amp; Styling</option>
                    <option>Grooming Essentials</option>
                    <option>Facial &amp; Skin Care</option>
                    <option>Waxing &amp; Hair Removal</option>
                    <option>Threading</option>
                    <option>Manicure &amp; Pedicure</option>
                    <option>Hair Colouring</option>
                    <option>Hair Treatments</option>
                    <option>Advanced Skin</option>
                    <option>Massage &amp; Wellness</option>
                    <option>Makeup &amp; Bridal</option>
                    <option>Premium Packages</option>
                </select>
                <select id="filterGender" onchange="renderTable()">
                    <option value="">All Genders</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
                <input class="search-input" type="text" id="searchInput" placeholder="Search services..."
                    oninput="renderTable()">
            </div>
            <button class="btn-add" onclick="openModal()">＋ Add Service</button>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Service Name</th>
                        <th>Category</th>
                        <th>Gender</th>
                        <th>Duration</th>
                        <th>Price (₹)</th>
                        <th>Special (₹)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="catalogueBody">
                    <tr>
                        <td colspan="7">
                            <div class="loading">Loading catalogue...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add / Edit Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Add Service</div>
            <input type="hidden" id="editId">

            <div class="form-group">
                <label class="form-label">Service Name *</label>
                <input class="form-control" id="fName" placeholder="e.g. Premium Haircut">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select class="form-control" id="fCategory">
                        <option value="">Select…</option>
                        <option>Hair &amp; Styling</option>
                        <option>Grooming Essentials</option>
                        <option>Facial &amp; Skin Care</option>
                        <option>Waxing &amp; Hair Removal</option>
                        <option>Threading</option>
                        <option>Manicure &amp; Pedicure</option>
                        <option>Hair Colouring</option>
                        <option>Hair Treatments</option>
                        <option>Advanced Skin</option>
                        <option>Massage &amp; Wellness</option>
                        <option>Makeup &amp; Bridal</option>
                        <option>Premium Packages</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Sub-Category</label>
                    <input class="form-control" id="fSubCategory" placeholder="Optional">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select class="form-control" id="fGender">
                        <option value="">All Genders</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Duration (min)</label>
                    <input class="form-control" id="fDuration" type="number" placeholder="30">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Base Price (₹) *</label>
                    <input class="form-control" id="fPrice" type="number" placeholder="500"
                        oninput="validateSpecialPrice()">
                </div>
                <div class="form-group">
                    <label class="form-label">Special Price (₹)</label>
                    <input class="form-control" id="fSpecial" type="number" placeholder="Optional"
                        oninput="validateSpecialPrice()">
                    <div id="specialPriceHint" style="margin-top:5px;font-size:12px;color:#94A3B8;">Note: Max 70%
                        discount allowed. Must be less than base price.</div>
                    <div id="specialPriceError" style="margin-top:4px;font-size:12px;color:#F87171;display:none;"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <input class="form-control" id="fDesc" placeholder="Short description">
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveService()">Save Service</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('adminLabel').textContent = `Admin · ${user.phone || ''}`;

        let allServices = [];
        let currentTypeTab = 'freelancer'; // freelancer = authoritative; salon = suggestive

        // Services relevant to salons vs freelancers based on the partner app flow:
        // Freelancers pick skill *categories* (not individual services); admin manages pricing.
        // Salons pick individual services. So "Freelancer" tab shows Unisex/all gender services.
        const FREELANCER_CATS = ['Hair & Styling', 'Grooming Essentials', 'Facial & Skin Care', 'Waxing & Hair Removal', 'Threading', 'Manicure & Pedicure'];

        function isFreelancerService(s) {
            return FREELANCER_CATS.some(c => s.category === c);
        }
        function isSalonService(s) {
            return true; // salons can offer everything
        }

        async function loadCatalogue() {
            try {
                const res = await fetch('/admin/api/catalogue', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                if (data.success) { allServices = data.services; renderTable(); }
            } catch (e) {
                console.error('[Admin] Catalogue load error:', e);
                document.getElementById('catalogueBody').innerHTML =
                    '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">⚠️</div><div>Failed to load catalogue. Check if the server is running.</div><button class="btn-edit" style="margin-top:10px" onclick="loadCatalogue()">Retry</button></div></td></tr>';
            }
        }

        function renderTable() {
            const body = document.getElementById('catalogueBody');
            const cat = document.getElementById('filterCategory').value;
            const gen = document.getElementById('filterGender').value;
            const q = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allServices.filter(s => {
                const catMatch = !cat || s.category === cat;
                const genMatch = !gen || (s.gender || '') === gen;
                const search = !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q);
                const typeMatch = currentTypeTab === 'all'
                    || (currentTypeTab === 'freelancer' && isFreelancerService(s))
                    || (currentTypeTab === 'salon');
                return catMatch && genMatch && search && typeMatch;
            });

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📋</div><div>No services found — try adjusting filters or add one.</div></div></td></tr>`;
                return;
            }

            body.innerHTML = filtered.map(s => {
                const pricing = s.pricingByRole && s.pricingByRole[currentTypeTab === 'freelancer' ? 'Freelancer' : 'Salon'];
                const displayPrice = pricing ? pricing.defaultPrice : s.defaultPrice;
                const displaySpecial = pricing ? pricing.specialPrice : s.specialPrice;

                return `
        <tr>
            <td>
                <div style="font-weight: 700; color: #0F172A;">${esc(s.name)}</div>
                ${s.subCategory ? `<div style="font-size:11px;color:var(--text-dim)">${esc(s.subCategory)}</div>` : ''}
            </td>
            <td><span style="font-size: 13px; font-weight: 500;">${esc(s.category)}</span></td>
            <td><span class="gender-pill ${genderClass(s.gender)}">${s.gender || 'All Genders'}</span></td>
            <td><span style="font-weight: 500;">${s.duration} min</span></td>
            <td><span style="font-weight: 700;">₹${displayPrice}</span></td>
            <td>${displaySpecial ? `<span style="color:var(--success); font-weight: 700;">₹${displaySpecial}</span>` : '<span style="color:var(--text-dim);">—</span>'}</td>
            <td style="display: flex; gap: 4px;">
                <button class="btn-edit" onclick="openModal(${JSON.stringify(s).split('"').join("'")})">Edit</button>
                <button class="btn-del"  onclick="deleteService('${s.id}','${esc(s.name)}')">Delete</button>
            </td>
        </tr>
    `;
            }).join('');
        }

        function genderClass(g) {
            if (g === 'Male') return 'male';
            if (g === 'Female') return 'female';
            return 'all-genders';
        }

        function setTypeTab(type, btn) {
            currentTypeTab = type;
            document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        }

        // ── Modal ──────────────────────────────────────────────────────────────────────
        function openModal(service) {
            document.getElementById('modalBg').classList.add('open');
            if (service) {
                document.getElementById('modalTitle').textContent = 'Edit Service';
                document.getElementById('editId').value = service.id;
                document.getElementById('fName').value = service.name || '';
                document.getElementById('fCategory').value = service.category || '';
                document.getElementById('fSubCategory').value = service.subCategory || '';
                document.getElementById('fGender').value = service.gender || '';
                document.getElementById('fDuration').value = service.duration || 30;
                const pricing = service.pricingByRole && service.pricingByRole[currentTypeTab === 'freelancer' ? 'Freelancer' : 'Salon'];
                document.getElementById('fPrice').value = pricing ? pricing.defaultPrice : (service.defaultPrice || '');
                document.getElementById('fSpecial').value = pricing ? (pricing.specialPrice || '') : (service.specialPrice || '');
                document.getElementById('fDesc').value = service.description || '';
            } else {
                document.getElementById('modalTitle').textContent = 'Add Service';
                document.getElementById('editId').value = '';
                ['fName', 'fCategory', 'fSubCategory', 'fGender', 'fDuration', 'fPrice', 'fSpecial', 'fDesc']
                    .forEach(id => document.getElementById(id).value = '');
            }
        }

        function closeModal() {
            document.getElementById('modalBg').classList.remove('open');
        }

        // Close modal on backdrop click
        document.getElementById('modalBg').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        function validateSpecialPrice() {
            const basePrice = Number(document.getElementById('fPrice').value) || 0;
            const specialVal = document.getElementById('fSpecial').value;
            const errEl = document.getElementById('specialPriceError');
            if (!specialVal) { errEl.style.display = 'none'; return true; }
            const specialPrice = Number(specialVal);
            if (specialPrice >= basePrice) {
                errEl.textContent = 'Special price must be less than the base price.';
                errEl.style.display = 'block';
                return false;
            }
            if (basePrice > 0 && specialPrice < basePrice * 0.30) {
                errEl.textContent = 'Max 70% discount allowed. Special price is too low.';
                errEl.style.display = 'block';
                return false;
            }
            errEl.style.display = 'none';
            return true;
        }

        async function saveService() {
            const id = document.getElementById('editId').value;
            const basePrice = Number(document.getElementById('fPrice').value);
            const specialRaw = document.getElementById('fSpecial').value;
            const specialPrice = specialRaw ? Number(specialRaw) : null;

            const payload = {
                name: document.getElementById('fName').value.trim(),
                category: document.getElementById('fCategory').value,
                subCategory: document.getElementById('fSubCategory').value.trim() || null,
                gender: document.getElementById('fGender').value || null,
                duration: Number(document.getElementById('fDuration').value) || 30,
                defaultPrice: basePrice,
                specialPrice,
                description: document.getElementById('fDesc').value.trim() || null,
            };

            if (!payload.name || !payload.category) {
                alert('Name and category are required.');
                return;
            }

            if (basePrice <= 0) {
                alert('Base price must be greater than 0.');
                return;
            }

            if (specialPrice !== null) {
                if (specialPrice >= basePrice) {
                    alert('Special price must be less than the base price.');
                    return;
                }
                if (specialPrice < basePrice * 0.30) {
                    alert('Max 70% discount allowed. Special price is too low.');
                    return;
                }
            }

            try {
                let url, method, finalPayload;

                if (id && currentTypeTab === 'freelancer') {
                    // Update role-specific pricing for Freelancer
                    url = `/admin/api/catalogue/${id}/pricing`;
                    method = 'PUT';
                    finalPayload = {
                        partnerType: 'Freelancer',
                        defaultPrice: basePrice,
                        specialPrice: specialPrice
                    };
                } else {
                    // Master global update (used for new services or Salon tab edits)
                    url = id ? `/admin/api/catalogue/${id}` : '/admin/api/catalogue';
                    method = id ? 'PUT' : 'POST';
                    finalPayload = payload;
                }

                const res = await fetch(url, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalPayload)
                });
                const data = await res.json();
                if (data.success) {
                    if (id) {
                        const idx = allServices.findIndex(s => s.id === id);
                        if (idx !== -1) allServices[idx] = data.service;
                    } else {
                        allServices.unshift(data.service);
                    }
                    closeModal();
                    renderTable();
                } else {
                    alert(`Error: ${data.message}`);
                }
            } catch (e) {
                alert('Network error. Please try again.');
            }
        }

        async function deleteService(id, name) {
            if (!confirm(`Delete "${name}"?\n\nThis will remove it from the catalogue permanently.`)) return;
            try {
                const res = await fetch(`/admin/api/catalogue/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    allServices = allServices.filter(s => s.id !== id);
                    renderTable();
                } else {
                    alert(`Error: ${data.message}`);
                }
            } catch (e) {
                alert('Network error. Please try again.');
            }
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        loadCatalogue();
    </script>
</body>

</html>
