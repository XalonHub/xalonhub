<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Service Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* ── Specialized Catalogue Styles ───────────────── */
        .type-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            padding: 6px;
            background: var(--primary-light);
            border-radius: 14px;
            width: fit-content;
        }

        .type-tab {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .type-tab:hover {
            color: var(--primary);
        }

        .type-tab.active {
            background: #FFFFFF;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* ── Toolbar ────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
            flex: 1;
            flex-wrap: wrap;
        }

        /* Global form styles now handled by dashboard.css */
        .search-input {
            min-width: 250px;
        }

        .search-input {
            min-width: 200px;
        }

        .btn-add {
            background: var(--primary);
            color: #FFF;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        /* ── Pill badge for gender ──────────────────────── */
        .gender-pill {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
        }

        .male {
            background: rgba(59, 130, 246, 0.15);
            color: #60A5FA;
        }

        .female {
            background: rgba(236, 72, 153, 0.15);
            color: #F472B6;
        }

        .all-genders {
            background: rgba(16, 185, 129, 0.15);
            color: #34D399;
        }

        /* ── Modal ──────────────────────────────────────── */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-bg.open {
            display: flex;
        }

        .modal {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        .btn-save {
            background: var(--primary);
            color: #FFF;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            background: var(--surface);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        /* ── Misc ───────────────────────────────────────── */
        .btn-edit,
        .btn-del {
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        .btn-edit {
            background: var(--primary-light);
            color: var(--primary);
            margin-right: 4px;
        }

        .btn-edit:hover {
            background: rgba(91, 100, 211, 0.3);
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-del:hover {
            background: rgba(239, 68, 68, 0.25);
        }
    </style>
</head>

<body>

    <script src="sidebar.js"></script>
    <nav class="nav">
        <span class="nav-page-title">Service Catalogue</span>
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page">

        <!-- Partner Type Tabs -->
        <div class="type-tabs">
            <button class="type-tab active" id="tabFreelancer" onclick="setTypeTab('freelancer',this)">
                <span>👤 Freelancer</span>
                <span class="badge" style="background: rgba(0,0,0,0.05); color: var(--text-dim); font-size: 10px;">Platform Pricing</span>
            </button>
            <button class="type-tab" id="tabSalon" onclick="setTypeTab('salon',this)">
                <span>🏪 Salon</span>
                <span class="badge" style="background: rgba(0,0,0,0.05); color: var(--text-dim); font-size: 10px;">Partner Pricing</span>
            </button>
            <button class="type-tab" id="tabCategory" onclick="setTypeTab('category',this)">
                <span>🏷️ Categories</span>
            </button>
        </div>

        <!-- Toolbar: Category filter + Gender filter + Search + Add -->
        <div class="toolbar" id="catalogueToolbar">
            <div class="toolbar-left">
                <select id="filterCategory" onchange="renderTable()">
                    <option value="">All Categories</option>
                </select>
                <select id="filterGender" onchange="renderTable()">
                    <option value="">All Genders</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
                <input class="search-input" type="text" id="searchInput" placeholder="Search services..."
                    oninput="renderTable()">
            </div>
            <button class="btn-add" onclick="openModal()">＋ Add Service</button>
        </div>

        <div class="toolbar" id="categoryToolbar" style="display:none;">
            <div class="toolbar-left">
                <input class="search-input" type="text" id="catSearchInput" placeholder="Search categories..."
                    oninput="renderCategoriesTable()">
            </div>
            <button class="btn-add" onclick="openCatModal()">＋ Add Category</button>
        </div>

        <!-- Table Catalogue -->
        <div class="table-wrap" id="catalogueTableWrap">
            <table>
                <thead>
                    <tr>
                        <th>Service Name</th>
                        <th>Category</th>
                        <th>Gender</th>
                        <th>Duration</th>
                        <th>Price (₹)</th>
                        <th>Special (₹)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="catalogueBody">
                    <tr>
                        <td colspan="7">
                            <div class="loading">Loading catalogue...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Table Categories -->
        <div class="table-wrap" id="categoryTableWrap" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>Thumbnail</th>
                        <th>Category Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="categoryBody">
                    <tr><td colspan="4"><div class="loading">Loading categories...</div></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add / Edit Modal -->
    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Add Service</div>
            <input type="hidden" id="editId">
            <input type="hidden" id="editModalType" value="service">

            <!-- Service Form -->
            <div id="serviceFormFields">
                <div class="form-group">
                    <label class="form-label">Service Name *</label>
                    <input class="form-control" id="fName" placeholder="e.g. Premium Haircut">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select class="form-control" id="fCategory">
                            <option value="">Select…</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sub-Category</label>
                        <input class="form-control" id="fSubCategory" placeholder="Optional">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select class="form-control" id="fGender">
                            <option value="">All Genders</option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Duration (min)</label>
                        <input class="form-control" id="fDuration" type="number" placeholder="30">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Base Price (₹) *</label>
                        <input class="form-control" id="fPrice" type="number" placeholder="500"
                            oninput="validateSpecialPrice()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Special Price (₹)</label>
                        <input class="form-control" id="fSpecial" type="number" placeholder="Optional"
                            oninput="validateSpecialPrice()">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <input class="form-control" id="fDesc" placeholder="Short description">
                </div>
            </div>

            <!-- Category Form -->
            <div id="categoryFormFields" style="display:none;">
                <div class="form-group">
                    <label class="form-label">Category Name *</label>
                    <input class="form-control" id="fCatName" placeholder="e.g. Hair & Styling">
                    <small style="color:red; font-size:11px;">Renaming updates all services automatically.</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Display Image</label>
                    <input type="file" id="fCatFile" accept="image/*" onchange="handleCatFile(event)" style="margin-bottom:10px;">
                    <img id="catPreview" style="width:100%; height:150px; object-fit:cover; border-radius:12px; display:none; border:1px solid var(--border);">
                    <input type="hidden" id="fCatImage">
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="handleSave()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('adminLabel').textContent = `Admin · ${user.phone || ''}`;

        let allServices = [];
        let allCategories = [];
        let currentTypeTab = 'freelancer'; // freelancer, salon, category
        let selectedFile = null;

        async function init() {
            await Promise.all([loadCatalogue(), loadCategories()]);
        }

        async function loadCatalogue() {
            try {
                const res = await fetch('/admin/api/catalogue', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                if (data.success) { 
                    allServices = data.services; 
                    renderTable(); 
                }
            } catch (e) {
                console.error('[Admin] Catalogue load error:', e);
                document.getElementById('catalogueBody').innerHTML = '<tr><td colspan="7">Error loading catalogue</td></tr>';
            }
        }

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                allCategories = await res.json();
                
                // Update the category filter in the catalogue toolbar
                const filterSelect = document.getElementById('filterCategory');
                const formSelect = document.getElementById('fCategory');
                const currentValue = filterSelect.value;
                
                const options = '<option value="">All Categories</option>' + 
                    allCategories.map(c => `<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
                
                filterSelect.innerHTML = options;
                formSelect.innerHTML = '<option value="">Select…</option>' + 
                    allCategories.map(c => `<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
                
                filterSelect.value = currentValue;
                
                if (currentTypeTab === 'category') renderCategoriesTable();
            } catch (e) {
                console.error('[Admin] Categories load error:', e);
            }
        }

        function renderTable() {
            const body = document.getElementById('catalogueBody');
            const cat = document.getElementById('filterCategory').value;
            const gen = document.getElementById('filterGender').value;
            const q = document.getElementById('searchInput').value.toLowerCase();

            // Freelancer restrictions based on specific beauty segments
            const FREELANCER_CATS = ['Hair & Styling', 'Grooming Essentials', 'Facial & Skin Care', 'Threading', 'Manicure & Pedicure', 'Massage & Wellness'];

            const filtered = allServices.filter(s => {
                const catMatch = !cat || s.category === cat;
                const genMatch = !gen || (s.gender || '') === gen;
                const search = !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q);
                const typeMatch = (currentTypeTab === 'freelancer' && FREELANCER_CATS.includes(s.category))
                    || (currentTypeTab === 'salon');
                return catMatch && genMatch && search && typeMatch;
            });

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="7"><div class="empty-state">No services found</div></td></tr>`;
                return;
            }

            body.innerHTML = filtered.map(s => {
                const pricing = s.pricingByRole && s.pricingByRole[currentTypeTab === 'freelancer' ? 'Freelancer' : 'Salon'];
                const displayPrice = pricing ? pricing.defaultPrice : s.defaultPrice;
                const displaySpecial = pricing ? pricing.specialPrice : s.specialPrice;

                return `
                    <tr>
                        <td>
                            <div style="font-weight: 700; color: #0F172A;">${esc(s.name)}</div>
                            ${s.subCategory ? `<div style="font-size:11px;color:var(--text-dim)">${esc(s.subCategory)}</div>` : ''}
                        </td>
                        <td><span style="font-size: 13px; font-weight: 500;">${esc(s.category)}</span></td>
                        <td><span class="gender-pill ${genderClass(s.gender)}">${s.gender || 'All Genders'}</span></td>
                        <td><span style="font-weight: 500;">${s.duration} min</span></td>
                        <td><span style="font-weight: 700;">₹${displayPrice}</span></td>
                        <td>${displaySpecial ? `<span style="color:var(--success); font-weight: 700;">₹${displaySpecial}</span>` : '<span style="color:var(--text-dim);">—</span>'}</td>
                        <td style="display: flex; gap: 4px;">
                            <button class="btn-edit" onclick="openServiceModalById('${s.id}')">Edit</button>
                            <button class="btn-del"  onclick="deleteService('${s.id}','${esc(s.name)}')">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderCategoriesTable() {
            const body = document.getElementById('categoryBody');
            const q = document.getElementById('catSearchInput').value.toLowerCase();
            
            const filtered = allCategories.filter(c => !q || c.name.toLowerCase().includes(q));
            
            if (filtered.length === 0) {
                body.innerHTML = '<tr><td colspan="4"><div class="empty-state">No categories found</div></td></tr>';
                return;
            }

            body.innerHTML = filtered.map(cat => `
                <tr>
                    <td><img src="${cat.image || 'https://via.placeholder.com/48'}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;background:#f1f5f9;"></td>
                    <td style="font-weight:700;">${esc(cat.name)}</td>
                    <td><span class="gender-pill all-genders">${cat.isActive !== false ? 'Active' : 'Hidden'}</span></td>
                    <td style="display: flex; gap: 4px;">
                        <button class="btn-edit" onclick="openCatModalById('${cat.id}')">Edit</button>
                        <button class="btn-del" onclick="deleteCategory('${cat.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function setTypeTab(type, btn) {
            currentTypeTab = type;
            document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (type === 'category') {
                document.getElementById('catalogueToolbar').style.display = 'none';
                document.getElementById('catalogueTableWrap').style.display = 'none';
                document.getElementById('categoryToolbar').style.display = 'flex';
                document.getElementById('categoryTableWrap').style.display = 'block';
                renderCategoriesTable();
            } else {
                document.getElementById('catalogueToolbar').style.display = 'flex';
                document.getElementById('catalogueTableWrap').style.display = 'block';
                document.getElementById('categoryToolbar').style.display = 'none';
                document.getElementById('categoryTableWrap').style.display = 'none';
                renderTable();
            }
        }

        function genderClass(g) {
            if (g === 'Male') return 'male';
            if (g === 'Female') return 'female';
            return 'all-genders';
        }

        function openServiceModalById(id) {
            const service = allServices.find(s => s.id === id);
            openModal(service);
        }

        function openCatModalById(id) {
            const cat = allCategories.find(c => c.id === id);
            openCatModal(cat);
        }

        // ── Service Modal ──────────────────────────────────────
        function openModal(service) {
            document.getElementById('modalBg').classList.add('open');
            document.getElementById('editModalType').value = 'service';
            document.getElementById('serviceFormFields').style.display = 'block';
            document.getElementById('categoryFormFields').style.display = 'none';
            
            if (service) {
                document.getElementById('modalTitle').textContent = 'Edit Service';
                document.getElementById('editId').value = service.id;
                document.getElementById('fName').value = service.name || '';
                document.getElementById('fCategory').value = service.category || '';
                document.getElementById('fSubCategory').value = service.subCategory || '';
                document.getElementById('fGender').value = service.gender || '';
                document.getElementById('fDuration').value = service.duration || 30;
                const pricing = service.pricingByRole && service.pricingByRole[currentTypeTab === 'freelancer' ? 'Freelancer' : 'Salon'];
                document.getElementById('fPrice').value = pricing ? pricing.defaultPrice : (service.defaultPrice || '');
                document.getElementById('fSpecial').value = pricing ? (pricing.specialPrice || '') : (service.specialPrice || '');
                document.getElementById('fDesc').value = service.description || '';
            } else {
                document.getElementById('modalTitle').textContent = 'Add Service';
                document.getElementById('editId').value = '';
                ['fName','fCategory','fSubCategory','fGender','fDuration','fPrice','fSpecial','fDesc'].forEach(id => document.getElementById(id).value = '');
            }
        }

        // ── Category Modal ─────────────────────────────────────
        function openCatModal(cat) {
            document.getElementById('modalBg').classList.add('open');
            document.getElementById('editModalType').value = 'category';
            document.getElementById('serviceFormFields').style.display = 'none';
            document.getElementById('categoryFormFields').style.display = 'block';
            
            selectedFile = null;
            document.getElementById('fCatFile').value = '';
            
            if (cat) {
                document.getElementById('modalTitle').textContent = 'Edit Category';
                document.getElementById('editId').value = cat.id;
                document.getElementById('fCatName').value = cat.name || '';
                document.getElementById('fCatImage').value = cat.image || '';
                if (cat.image) {
                    document.getElementById('catPreview').src = cat.image;
                    document.getElementById('catPreview').style.display = 'block';
                } else {
                    document.getElementById('catPreview').style.display = 'none';
                }
            } else {
                document.getElementById('modalTitle').textContent = 'Add Category';
                document.getElementById('editId').value = '';
                document.getElementById('fCatName').value = '';
                document.getElementById('fCatImage').value = '';
                document.getElementById('catPreview').style.display = 'none';
            }
        }

        function handleCatFile(e) {
            if (e.target.files && e.target.files[0]) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('catPreview').src = e.target.result;
                    document.getElementById('catPreview').style.display = 'block';
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        function closeModal() {
            document.getElementById('modalBg').classList.remove('open');
        }

        document.getElementById('modalBg').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        function validateSpecialPrice() {
            const basePrice = Number(document.getElementById('fPrice').value) || 0;
            const specialVal = document.getElementById('fSpecial').value;
            const errEl = document.getElementById('specialPriceError');
            if (!specialVal) { errEl.style.display = 'none'; return true; }
            const specialPrice = Number(specialVal);
            if (specialPrice >= basePrice) {
                errEl.textContent = 'Special price must be less than the base price.';
                errEl.style.display = 'block';
                return false;
            }
            if (basePrice > 0 && specialPrice < basePrice * 0.30) {
                errEl.textContent = 'Max 70% discount allowed.';
                errEl.style.display = 'block';
                return false;
            }
            errEl.style.display = 'none';
            return true;
        }

        async function handleSave() {
            const type = document.getElementById('editModalType').value;
            if (type === 'service') await saveService();
            else await saveCategory();
        }

        async function saveService() {
            const id = document.getElementById('editId').value;
            const basePrice = Number(document.getElementById('fPrice').value);
            const specialRaw = document.getElementById('fSpecial').value;
            const specialPrice = specialRaw ? Number(specialRaw) : null;

            const payload = {
                name: document.getElementById('fName').value.trim(),
                category: document.getElementById('fCategory').value,
                subCategory: document.getElementById('fSubCategory').value.trim() || null,
                gender: document.getElementById('fGender').value || null,
                duration: Number(document.getElementById('fDuration').value) || 30,
                defaultPrice: basePrice,
                specialPrice,
                description: document.getElementById('fDesc').value.trim() || null,
            };

            if (!payload.name || !payload.category) return alert('Name and category are required.');

            try {
                let url, method, finalPayload;
                if (id && currentTypeTab === 'freelancer') {
                    url = `/admin/api/catalogue/${id}/pricing`;
                    method = 'PUT';
                    finalPayload = { partnerType: 'Freelancer', defaultPrice: basePrice, specialPrice: specialPrice };
                } else {
                    url = id ? `/admin/api/catalogue/${id}` : '/admin/api/catalogue';
                    method = id ? 'PUT' : 'POST';
                    finalPayload = payload;
                }

                const res = await fetch(url, {
                    method,
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalPayload)
                });
                const data = await res.json();
                if (data.success) {
                    loadCatalogue();
                    closeModal();
                } else alert(`Error: ${data.message}`);
            } catch (e) { alert('Network error'); }
        }

        async function saveCategory() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('fCatName').value.trim();
            if (!name) return alert('Category Name is required');

            const saveBtn = document.querySelector('.btn-save');
            const originalText = saveBtn.textContent;
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            try {
                let categoryId = id;
                if (!id) {
                    const createRes = await fetch('/api/categories', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ name })
                    });
                    const created = await createRes.json();
                    if (created.error) throw new Error(created.error);
                    categoryId = created.id;
                }

                let imageUrl = document.getElementById('fCatImage').value;
                if (selectedFile) {
                    const signRes = await fetch('/api/upload/sign', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ resourceType: 'CATEGORY_THUMBNAIL', resourceId: categoryId })
                    });
                    const signData = await signRes.json();
                    
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    formData.append('api_key', signData.api_key);
                    formData.append('timestamp', signData.timestamp);
                    formData.append('signature', signData.signature);
                    formData.append('public_id', signData.public_id);
                    if (signData.folder) formData.append('folder', signData.folder);

                    const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${signData.cloud_name}/auto/upload`, {
                        method: 'POST', body: formData
                    });
                    const uploadData = await uploadRes.json();
                    imageUrl = uploadData.secure_url;
                }

                const updateRes = await fetch(`/api/categories/${categoryId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, image: imageUrl })
                });
                const updated = await updateRes.json();
                if (updated.error) throw new Error(updated.error);

                loadCategories();
                closeModal();
            } catch (err) { alert('Error: ' + err.message); }
            finally { 
                saveBtn.disabled = false; 
                saveBtn.textContent = originalText;
            }
        }

        async function deleteService(id, name) {
            if (!confirm(`Delete "${name}"?`)) return;
            const res = await fetch(`/admin/api/catalogue/${id}`, {
                method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) loadCatalogue();
        }

        async function deleteCategory(id) {
            if (!confirm('Delete this category? Services using it will be blocked.')) return;
            const res = await fetch(`/api/categories/${id}`, {
                method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.error) alert(data.error);
            else loadCategories();
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        init();
    </script>
</body>
</html>
