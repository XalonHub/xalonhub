<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Revenue Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .mini-stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .mini-stat-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .mini-stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
        }

        .table-container {
            background: white;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid #f1f5f9;
        }

        td {
            padding: 16px;
            font-size: 14px;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-completed {
            background: #dcfce7;
            color: #15803d;
        }

        .status-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-export {
            background: #f1f5f9;
            color: #475569;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-export:hover {
            background: #e2e8f0;
        }
    </style>
</head>

<body>
    <script src="sidebar.js"></script>
    <nav class="nav">
        <span class="nav-page-title">Reports</span>
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page">
        <div class="report-header">
            <button class="btn-export" onclick="alert('Export to CSV coming soon!')">
                📥 Export CSV
            </button>
        </div>

        <!-- Filter Bar -->
        <div
            style="background: white; padding: 20px; border-radius: 16px; border: 1px solid #f1f5f9; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
            <div style="display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 150px;">
                    <label
                        style="display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px;">From
                        Date</label>
                    <input type="date" id="repStartDate"
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;">
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label
                        style="display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px;">To
                        Date</label>
                    <input type="date" id="repEndDate"
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;">
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label
                        style="display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px;">Partner
                        Type</label>
                    <select id="repPartnerType"
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; font-family: inherit;">
                        <option value="">All Segments</option>
                        <option value="Freelancer">Freelancer</option>
                        <option value="Salon">Salon</option>
                    </select>
                </div>
                <button onclick="fetchReport()"
                    style="background: #1e293b; color: white; padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; height: 42px;">
                    Generate Report
                </button>
            </div>
        </div>

        <!-- Summary Row -->
        <div class="stats-grid">
            <div class="mini-stat-card">
                <div class="mini-stat-label">Total Revenue</div>
                <div class="mini-stat-value" id="totRevenue" style="color: #10b981;">₹0</div>
            </div>
            <div class="mini-stat-card">
                <div class="mini-stat-label">Platform Fees</div>
                <div class="mini-stat-value" id="totFees">₹0</div>
            </div>
            <div class="mini-stat-card">
                <div class="mini-stat-label">Total Commissions</div>
                <div class="mini-stat-value" id="totComm" style="color: #8b5cf6;">₹0</div>
            </div>
            <div class="mini-stat-card">
                <div class="mini-stat-label">Booking Count</div>
                <div class="mini-stat-value" id="totCount">0</div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <table id="reportsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Booking ID</th>
                        <th>Customer</th>
                        <th>Partner</th>
                        <th>Total Bill</th>
                        <th>Fee</th>
                        <th>Commission</th>
                        <th>Net Earnings</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="reportsBody">
                    <tr>
                        <td colspan="9" style="text-align: center; padding: 40px; color: #64748b;">
                            Loading report data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) { window.location.href = '/admin/'; }

        async function fetchReport() {
            const filters = {
                startDate: document.getElementById('repStartDate').value,
                endDate: document.getElementById('repEndDate').value,
                partnerType: document.getElementById('repPartnerType').value
            };
            const query = new URLSearchParams(filters).toString();

            try {
                const res = await fetch(`/admin/api/reports/revenue?${query}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success) {
                    renderSummary(data.summary);
                    renderTable(data.data);
                }
            } catch (err) {
                console.error('Report fetch failed', err);
            }
        }

        function renderSummary(s) {
            document.getElementById('totRevenue').textContent = `₹${s.totalRevenue.toLocaleString()}`;
            document.getElementById('totFees').textContent = `₹${s.totalPlatformFees.toLocaleString()}`;
            document.getElementById('totComm').textContent = `₹${s.totalCommissions.toLocaleString()}`;
            document.getElementById('totCount').textContent = s.totalCount;
        }

        function renderTable(list) {
            const body = document.getElementById('reportsBody');
            if (list.length === 0) {
                body.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: #64748b;">No records found for the selected criteria.</td></tr>';
                return;
            }

            body.innerHTML = list.map(b => `
                <tr>
                    <td>${new Date(b.date).toLocaleDateString('en-IN')}</td>
                    <td style="font-family: monospace; font-weight: 600; color: #4F46E5;">${b.bookingId}</td>
                    <td>${b.customer}</td>
                    <td>
                        <div style="font-weight: 600;">${b.partner}</div>
                        <div style="font-size: 11px; color: #94A3B8;">${b.partnerType}</div>
                    </td>
                    <td style="font-weight: 600;">₹${b.totalAmount.toLocaleString()}</td>
                    <td style="color: #3B82F6;">₹${b.platformFee}</td>
                    <td style="color: #8B5CF6;">₹${b.commission.toLocaleString()}</td>
                    <td style="color: #10B981; font-weight: 700;">₹${b.partnerEarnings.toLocaleString()}</td>
                    <td>
                        <span class="status-pill status-${(b.status || 'pending').toLowerCase()}">${b.status || 'Pending'}</span>
                    </td>
                </tr>
            `).join('');
        }

        function setDefaultDates() {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
            document.getElementById('repStartDate').value = firstDay;
            document.getElementById('repEndDate').value = lastDay;
        }

        // Initialize with default load
        setDefaultDates();
        fetchReport();
    </script>
</body>

</html>
