<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <script src="sidebar.js"></script>
    <nav class="nav">
        <span class="nav-page-title">Dashboard</span>
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page">

        <!-- Filter & Tools -->
        <div class="stat-card" style="display: flex; gap: 24px; align-items: flex-end; margin-bottom: 32px;">
            <div style="flex: 1;">
                <label class="form-label">From Date</label>
                <input type="date" id="filterStartDate" class="form-control">
            </div>
            <div style="flex: 1;">
                <label class="form-label">To Date</label>
                <input type="date" id="filterEndDate" class="form-control">
            </div>
            <div style="flex: 1;">
                <label class="form-label">Partner Type</label>
                <select id="filterPartnerType" class="form-control">
                    <option value="">All Types</option>
                    <option value="Freelancer">Freelancer</option>
                    <option value="Salon">Salon</option>
                </select>
            </div>
            <button onclick="applyFilters()" class="btn-view" style="height: 46px;">Apply Filters</button>
        </div>

        <!-- Metric Cards -->
        <div class="stats-grid-row">
            <div class="stat-card-sm">
                <div class="stat-icon">🤝</div>
                <div class="stat-info">
                    <div class="stat-value" id="statPartners">—</div>
                    <div class="stat-label">Active Partners</div>
                    <div id="kycBadge" class="badge" style="font-size: 10px; padding: 2px 8px; margin-top: 4px;">Loading...</div>
                </div>
            </div>

            <div class="stat-card-sm">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <div class="stat-value" id="statCustomers">—</div>
                    <div class="stat-label">Total Customers</div>
                </div>
            </div>

            <div class="stat-card-sm">
                <div class="stat-icon">📅</div>
                <div class="stat-info">
                    <div class="stat-value" id="statBookings">—</div>
                    <div class="stat-label">Active Bookings</div>
                </div>
            </div>

            <div class="stat-card-sm">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <div class="stat-value" id="statSales" style="color: #6366f1;">—</div>
                    <div class="stat-label">Gross Sales (GMV)</div>
                </div>
            </div>

            <div class="stat-card-sm">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <div class="stat-value" id="statRevenue" style="color: var(--success);">—</div>
                    <div class="stat-label">Platform Revenue</div>
                    <div style="display: flex; gap: 4px; margin-top: 4px;">
                        <span id="feeBadge" style="font-size: 10px; color: var(--primary);">F: —</span>
                        <span id="commBadge" style="font-size: 10px; color: var(--text-muted);">C: —</span>
                    </div>
                </div>
            </div>
        </div>

    </main>
 
    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.href = '/admin/index.html';
        }
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
 
        document.getElementById('adminLabel').textContent = `Admin · ${user.phone || ''}`;
 
        async function loadStats(filters = {}) {
            console.log('Fetching stats with filters:', filters);
            try {
                const query = new URLSearchParams(filters).toString();
                const res = await fetch(`/admin/api/dashboard/stats?${query}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                console.log('Stats response status:', res.status);
                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                console.log('Stats data:', data);
                if (data.success) {
                    const s = data.stats;
                    document.getElementById('statPartners').textContent = s.totalPartners || 0;
                    document.getElementById('statCustomers').textContent = s.totalCustomers || 0;
                    document.getElementById('statBookings').textContent = s.totalBookings || 0;
                    document.getElementById('statSales').textContent = `₹${(Number(s.totalSales) || 0).toLocaleString()}`;
 
                    const revenue = Number(s.totalRevenue) || 0;
                    const fees = Number(s.totalPlatformFees) || 0;
                    const commissions = Number(s.totalCommissions) || 0;

                    document.getElementById('statRevenue').textContent = `₹${revenue.toLocaleString()}`;
                    document.getElementById('feeBadge').textContent = `F: ₹${fees.toLocaleString()}`;
                    document.getElementById('commBadge').textContent = `C: ₹${commissions.toLocaleString()}`;
 
                    const kycEl = document.getElementById('kycBadge');
                    kycEl.textContent = s.pendingKyc > 0 ? `${s.pendingKyc} Pending` : 'All Clear';
                    if (s.pendingKyc === 0) {
                        kycEl.style.background = 'rgba(16,185,129,0.1)';
                        kycEl.style.color = '#10B981';
                    } else {
                        kycEl.style.background = '#FEF3C7';
                        kycEl.style.color = '#92400E';
                    }
                }
            } catch (e) {
                console.error('Failed to load stats', e);
            }
        }
 
        function logout() {
            localStorage.clear();
            window.location.href = '/admin/index.html';
        }

        function setDefaultDates() {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
            document.getElementById('filterStartDate').value = firstDay;
            document.getElementById('filterEndDate').value = lastDay;
        }

        function applyFilters() {
            const filters = {
                startDate: document.getElementById('filterStartDate').value,
                endDate: document.getElementById('filterEndDate').value,
                partnerType: document.getElementById('filterPartnerType').value
            };
            loadStats(filters);
        }

        setDefaultDates();
        loadStats({
            startDate: document.getElementById('filterStartDate').value,
            endDate: document.getElementById('filterEndDate').value
        });
    </script>
</body>

</html>
