<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Global Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .settings-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .settings-section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
        }
        .input-wrapper {
            position: relative;
        }
        .input-prefix {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-weight: 600;
        }
        .input-suffix {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 12px 12px 12px 28px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-control.suffix {
            padding: 12px 28px 12px 12px;
        }
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
        }
        .btn-save-settings {
            background: var(--primary);
            color: #FFF;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-save-settings:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--success);
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            display: none;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

<body>
    <script src="sidebar.js"></script>
    <nav class="nav">
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page">
        <div class="page-title">Global Settings</div>
        <div class="page-sub">Configure platform-wide financial parameters and commission structures</div>

        <div class="settings-container" style="max-width: 900px;">
            <div class="stat-card" style="margin-bottom: 32px; padding: 40px;">
                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
                    <div class="stat-icon" style="margin-bottom: 0;">💰</div>
                    <div style="font-size: 20px; font-weight: 700;">Platform Fees</div>
                </div>
                <div class="form-group" style="max-width: 320px;">
                    <label class="form-label">Customer Convenience Fee</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600;">₹</span>
                        <input type="number" id="platformFee" class="form-control" style="padding-left: 36px;" placeholder="10">
                    </div>
                    <p class="hint" style="margin-top: 8px; font-size: 12px; color: var(--text-muted);">Fixed convenience fee added to the subtotal of every booking.</p>
                </div>
            </div>

            <div class="stat-card" style="margin-bottom: 32px; padding: 40px;">
                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
                    <div class="stat-icon" style="margin-bottom: 0;">🤝</div>
                    <div style="font-size: 20px; font-weight: 700;">Commissions (App Bookings)</div>
                </div>
                <div class="links-grid" style="grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="form-group">
                        <label class="form-label">Freelancer Commission (%)</label>
                        <div style="position: relative;">
                            <input type="number" id="freelancerCommApp" class="form-control" placeholder="15">
                            <span style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600;">%</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Salon Commission (%)</label>
                        <div style="position: relative;">
                            <input type="number" id="salonCommApp" class="form-control" placeholder="0">
                            <span style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600;">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="stat-card" style="margin-bottom: 32px; padding: 40px;">
                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
                    <div class="stat-icon" style="margin-bottom: 0;">📝</div>
                    <div style="font-size: 20px; font-weight: 700;">Commissions (Manual/Hub Bookings)</div>
                </div>
                <div class="links-grid" style="grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="form-group">
                        <label class="form-label">Freelancer Commission (%)</label>
                        <div style="position: relative;">
                            <input type="number" id="freelancerCommMan" class="form-control" placeholder="10">
                            <span style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600;">%</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Salon Commission (%)</label>
                        <div style="position: relative;">
                            <input type="number" id="salonCommMan" class="form-control" placeholder="0">
                            <span style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600;">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; padding-bottom: 60px;">
                <button class="btn-save-settings" onclick="saveSettings()" style="padding: 14px 40px; font-size: 16px;">
                    💾 Save Changes
                </button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Settings updated successfully!</div>

    <script>
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('adminLabel').textContent = `Admin · ${user.phone || ''}`;

        async function loadSettings() {
            try {
                const res = await fetch('/admin/api/settings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const s = data.settings;
                    document.getElementById('platformFee').value = s.platformFee;
                    document.getElementById('freelancerCommApp').value = s.freelancerCommApp;
                    document.getElementById('freelancerCommMan').value = s.freelancerCommMan;
                    document.getElementById('salonCommApp').value = s.salonCommApp;
                    document.getElementById('salonCommMan').value = s.salonCommMan;
                }
            } catch (e) {
                console.error('Failed to load settings', e);
            }
        }

        async function saveSettings() {
            const payload = {
                platformFee: Number(document.getElementById('platformFee').value),
                freelancerCommApp: Number(document.getElementById('freelancerCommApp').value),
                freelancerCommMan: Number(document.getElementById('freelancerCommMan').value),
                salonCommApp: Number(document.getElementById('salonCommApp').value),
                salonCommMan: Number(document.getElementById('salonCommMan').value),
            };

            try {
                const btn = document.querySelector('.btn-save-settings');
                btn.disabled = true;
                btn.textContent = 'Saving...';

                const res = await fetch('/admin/api/settings', {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (e) {
                alert('Network error. Failed to save settings.');
            } finally {
                const btn = document.querySelector('.btn-save-settings');
                btn.disabled = false;
                btn.textContent = '💾 Save Changes';
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        loadSettings();
    </script>
</body>

</html>
