<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Global Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --premium-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            --premium-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .page-content {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--premium-shadow);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .settings-main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--premium-gradient);
        }

        .settings-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .settings-layout {
                grid-template-columns: 1fr;
            }
        }

        .settings-section {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .settings-section:hover {
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-dim);
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        .input-group {
            margin-bottom: 0;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            display: block;
        }

        .premium-input-wrapper {
            position: relative;
            transition: all 0.3s ease;
        }

        .premium-input-wrapper .prefix,
        .premium-input-wrapper .suffix {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            pointer-events: none;
        }

        .premium-input-wrapper .prefix { left: 16px; }
        .premium-input-wrapper .suffix { right: 16px; }

        .premium-control {
            width: 100%;
            padding: 14px 16px;
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .premium-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-dim);
            transform: scale(1.01);
        }

        .commissions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .hint-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            line-height: 1.5;
        }

        .save-bar {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .btn-premium-save {
            background: var(--premium-gradient);
            color: #FFF;
            border: none;
            padding: 16px 40px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .btn-premium-save:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3);
        }

        .btn-premium-save:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-premium-save:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 28px;
            border-radius: 16px;
            background: var(--success);
            color: white;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .svg-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>

<body>
    <script src="sidebar.js"></script>
    <nav class="nav">
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page page-content">
        <div class="page-title">Global Settings</div>
        <div class="page-sub">Configure platform-wide financial parameters and commission structures</div>

        <div class="settings-main-card">
            <div class="settings-layout">
                <!-- Left side: Platform Fees -->
                <div class="settings-column">
                    <div class="settings-section">
                        <div class="section-header">
                            <div class="section-icon">
                                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.97 0-1.76 1.15-3.04 2.86-3.4V4h2.67v1.86c1.39.28 2.36 1.32 2.5 2.55h-1.89c-.11-.78-.58-1.43-2.02-1.43-1.49 0-2.25.68-2.25 1.48 0 .83.58 1.42 2.67 1.93 2.57.62 4.18 1.63 4.18 4.22 0 1.96-1.36 3.01-3.11 3.48z"/></svg>
                            </div>
                            <h2 class="section-title">Platform Fees</h2>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Customer Convenience Fee</label>
                            <div class="premium-input-wrapper">
                                <span class="prefix">₹</span>
                                <input type="number" id="platformFee" class="premium-control" style="padding-left: 36px;" placeholder="10">
                            </div>
                            <p class="hint-text">Fixed convenience fee added to the subtotal of every booking on the platform.</p>
                        </div>
                    </div>
                </div>

                <!-- Right side: Commissions -->
                <div class="settings-column">
                    <div class="settings-section" style="margin-bottom: 24px;">
                        <div class="section-header">
                            <div class="section-icon">
                                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
                            </div>
                            <h2 class="section-title">Commissions (App Bookings)</h2>
                        </div>
                        <div class="commissions-grid">
                            <div class="form-group">
                                <label class="form-label">Freelancer %</label>
                                <div class="premium-input-wrapper">
                                    <input type="number" id="freelancerCommApp" class="premium-control" placeholder="15">
                                    <span class="suffix">%</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Salon %</label>
                                <div class="premium-input-wrapper">
                                    <input type="number" id="salonCommApp" class="premium-control" placeholder="0">
                                    <span class="suffix">%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <div class="section-header">
                            <div class="section-icon">
                                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            </div>
                            <h2 class="section-title">Commissions (Manual/Hub Bookings)</h2>
                        </div>
                        <div class="commissions-grid">
                            <div class="form-group">
                                <label class="form-label">Freelancer %</label>
                                <div class="premium-input-wrapper">
                                    <input type="number" id="freelancerCommMan" class="premium-control" placeholder="10">
                                    <span class="suffix">%</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Salon %</label>
                                <div class="premium-input-wrapper">
                                    <input type="number" id="salonCommMan" class="premium-control" placeholder="0">
                                    <span class="suffix">%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="save-bar">
                <button class="btn-premium-save" id="saveBtn" onclick="saveSettings()">
                    <svg class="svg-icon" style="width: 22px; height: 22px;" viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
                    Save Changes
                </button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Settings updated successfully!</div>

    <script>
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('adminLabel').textContent = `Admin · ${user.phone || ''}`;

        async function loadSettings() {
            try {
                const res = await fetch('/admin/api/settings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const s = data.settings;
                    document.getElementById('platformFee').value = s.platformFee;
                    document.getElementById('freelancerCommApp').value = s.freelancerCommApp;
                    document.getElementById('freelancerCommMan').value = s.freelancerCommMan;
                    document.getElementById('salonCommApp').value = s.salonCommApp;
                    document.getElementById('salonCommMan').value = s.salonCommMan;
                }
            } catch (e) {
                console.error('Failed to load settings', e);
            }
        }

        async function saveSettings() {
            const payload = {
                platformFee: Number(document.getElementById('platformFee').value),
                freelancerCommApp: Number(document.getElementById('freelancerCommApp').value),
                freelancerCommMan: Number(document.getElementById('freelancerCommMan').value),
                salonCommApp: Number(document.getElementById('salonCommApp').value),
                salonCommMan: Number(document.getElementById('salonCommMan').value),
            };

            try {
                const btn = document.getElementById('saveBtn');
                const originalContent = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = 'Saving...';

                const res = await fetch('/admin/api/settings', {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (e) {
                alert('Network error. Failed to save settings.');
            } finally {
                const btn = document.getElementById('saveBtn');
                btn.disabled = false;
                btn.innerHTML = `<svg class="svg-icon" style="width: 22px; height: 22px;" viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Save Changes`;
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        loadSettings();
    </script>
</body>

</html>
