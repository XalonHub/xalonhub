<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XalonHub Admin | Global Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        :root {
            --glass-bg: #FFFFFF;
            --glass-border: #E2E8F0;
            --premium-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            --premium-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --accent-purple: #6366F1;
            --border-muted: #F1F5F9;
        }

        .page-content {
            animation: fadeIn 0.6s ease-out;
            max-width: 1000px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-main-card {
            background: #FFFFFF;
            border-radius: 20px;
            box-shadow: var(--premium-shadow);
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
        }

        .card-header .headers-right {
            margin-left: auto;
            display: flex;
            gap: 100px; /* Adjust based on table column widths */
            padding-right: 60px;
        }

        .header-tab {
            font-size: 13px;
            font-weight: 700;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: #475569;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .pricing-table {
            width: 100%;
            border-collapse: collapse;
        }

        .pricing-table th {
            display: none; /* Moved to card-header */
        }

        .pricing-table th:first-child {
            text-align: left;
        }

        .pricing-table td {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .pricing-table .row-label {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            width: 30%;
        }

        .input-cell {
            text-align: right;
        }

        .pricing-input-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 160px;
        }

        .pricing-input-wrapper.full-width {
            width: 100%;
        }

        .pricing-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            transition: all 0.2s;
            background: #FAFBFF;
            text-align: left;
        }

        .pricing-control:focus {
            outline: none;
            border-color: #6366F1;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .pricing-input-wrapper .currency,
        .pricing-input-wrapper .unit {
            position: absolute;
            color: #94A3B8;
            font-weight: 500;
            font-size: 14px;
            pointer-events: none;
        }

        .pricing-input-wrapper .currency { left: 16px; }
        .pricing-input-wrapper .unit { right: 16px; }

        .pricing-control.has-prefix { padding-left: 36px; }
        .pricing-control.has-suffix { padding-right: 36px; }

        .fee-section {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-light);
        }

        .fee-label {
            font-size: 14px;
            font-weight: 600;
            color: #64748B;
            margin-bottom: 12px;
            display: block;
        }

        .save-bar {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F8FAFC;
        }

        .btn-reset {
            background: #FFFFFF;
            color: #475569;
            border: 1px solid #E2E8F0;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }

        .btn-save {
            background: #5E5CE6;
            color: #FFFFFF;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(94, 92, 230, 0.2);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(94, 92, 230, 0.3);
            filter: brightness(1.1);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-save:disabled {
            background: #CBD5E1;
            color: #94A3B8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 28px;
            border-radius: 16px;
            background: var(--success);
            color: white;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .svg-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .table-divider {
            width: 1px;
            background: #F1F5F9;
            height: 100%;
            position: absolute;
            right: 0;
            top: 0;
        }
    </style>
</head>

<body>
    <script src="sidebar.js"></script>
    <nav class="nav">
        <span class="nav-page-title">Settings</span>
        <div class="nav-right">
            <span class="nav-user" id="adminLabel">Admin</span>
        </div>
    </nav>

    <main class="page page-content">
        <div class="settings-main-card">
            <div class="card-header">
                <h2 class="card-title">Global Pricing Config</h2>
                <div class="headers-right">
                    <span class="header-tab">App Bookings</span>
                    <span class="header-tab">Manual Bookings</span>
                </div>
            </div>
            
            <table class="pricing-table">
                <tbody>
                    <tr>
                        <td class="row-label">Freelancer %</td>
                        <td class="input-cell">
                            <div class="pricing-input-wrapper">
                                <input type="number" id="freelancerCommApp" class="pricing-control has-suffix" placeholder="15">
                                <span class="unit">%</span>
                            </div>
                        </td>
                        <td class="input-cell" style="border-left: 1px solid #F1F5F9;">
                            <div class="pricing-input-wrapper">
                                <input type="number" id="freelancerCommMan" class="pricing-control has-suffix" placeholder="5">
                                <span class="unit">%</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="row-label">Salon %</td>
                        <td class="input-cell">
                            <div class="pricing-input-wrapper">
                                <input type="number" id="salonCommApp" class="pricing-control has-suffix" placeholder="5">
                                <span class="unit">%</span>
                            </div>
                        </td>
                        <td class="input-cell" style="border-left: 1px solid #F1F5F9;">
                            <div class="pricing-input-wrapper">
                                <input type="number" id="salonCommMan" class="pricing-control has-suffix" placeholder="2">
                                <span class="unit">%</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="row-label">Customer Fee</td>
                        <td class="input-cell">
                            <div class="pricing-input-wrapper">
                                <span class="currency">₹</span>
                                <input type="number" id="platformFee" class="pricing-control has-prefix" placeholder="10">
                            </div>
                        </td>
                        <td class="input-cell" style="border-left: 1px solid #F1F5F9;">
                            <div class="pricing-input-wrapper">
                                <span class="currency">₹</span>
                                <input type="number" id="platformFeeManual" class="pricing-control has-prefix" placeholder="0">
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="save-bar">
                <button class="btn-reset" onclick="handleBack()">
                    <svg viewBox="0 0 24 24" class="svg-icon"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    Back
                </button>
                <button class="btn-save" id="saveBtn" onclick="saveSettings()" disabled>
                    <svg viewBox="0 0 24 24" class="svg-icon"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    Save Changes
                </button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Settings updated successfully!</div>

    <script>
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('adminLabel').textContent = `Admin · ${user.phone || ''}`;

        let originalSettings = {};

        async function loadSettings() {
            try {
                const res = await fetch('/admin/api/settings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    originalSettings = data.settings;
                    updateInputs(originalSettings);
                }
            } catch (e) {
                console.error('Failed to load settings', e);
            }
        }

        function updateInputs(s) {
            document.getElementById('platformFee').value = s.platformFee;
            document.getElementById('platformFeeManual').value = s.platformFeeManual;
            document.getElementById('freelancerCommApp').value = s.freelancerCommApp;
            document.getElementById('freelancerCommMan').value = s.freelancerCommMan;
            document.getElementById('salonCommApp').value = s.salonCommApp;
            document.getElementById('salonCommMan').value = s.salonCommMan;
            checkChanges();
        }

        // Add change detection to all inputs
        ['platformFee', 'platformFeeManual', 'freelancerCommApp', 'freelancerCommMan', 'salonCommApp', 'salonCommMan'].forEach(id => {
            document.getElementById(id).addEventListener('input', checkChanges);
        });

        function checkChanges() {
            const current = {
                platformFee: Number(document.getElementById('platformFee').value),
                platformFeeManual: Number(document.getElementById('platformFeeManual').value),
                freelancerCommApp: Number(document.getElementById('freelancerCommApp').value),
                freelancerCommMan: Number(document.getElementById('freelancerCommMan').value),
                salonCommApp: Number(document.getElementById('salonCommApp').value),
                salonCommMan: Number(document.getElementById('salonCommMan').value),
            };

            const hasChanged = 
                current.platformFee !== originalSettings.platformFee ||
                current.platformFeeManual !== originalSettings.platformFeeManual ||
                current.freelancerCommApp !== originalSettings.freelancerCommApp ||
                current.freelancerCommMan !== originalSettings.freelancerCommMan ||
                current.salonCommApp !== originalSettings.salonCommApp ||
                current.salonCommMan !== originalSettings.salonCommMan;

            document.getElementById('saveBtn').disabled = !hasChanged;
        }

        async function saveSettings() {
            const payload = {
                platformFee: Number(document.getElementById('platformFee').value),
                platformFeeManual: Number(document.getElementById('platformFeeManual').value),
                freelancerCommApp: Number(document.getElementById('freelancerCommApp').value),
                freelancerCommMan: Number(document.getElementById('freelancerCommMan').value),
                salonCommApp: Number(document.getElementById('salonCommApp').value),
                salonCommMan: Number(document.getElementById('salonCommMan').value),
            };

            try {
                const btn = document.getElementById('saveBtn');
                const originalContent = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = 'Saving...';

                const res = await fetch('/admin/api/settings', {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    originalSettings = { ...payload };
                    showToast();
                    checkChanges();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (e) {
                alert('Network error. Failed to save settings.');
            } finally {
                const btn = document.getElementById('saveBtn');
                btn.innerHTML = `<svg viewBox="0 0 24 24" class="svg-icon"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg> Save Changes`;
            }
        }

        function handleBack() {
            window.location.href = 'dashboard.html';
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        loadSettings();
    </script>
</body>

</html>
